<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Egg Game</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}
canvas {
  display: block;
}
</style>

</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const ground = canvas.height - 100;
const mapWidth = 1500;

// ===== PLAYER =====
let player = {
  x: 100,
  y: 200,
  w: 40,
  h: 60,
  vx: 0,
  vy: 0,
  speed: 4,
  gravity: 0.5,
  lift: -0.7
};

// ===== INPUT =====
let keys = {};
document.onkeydown = e => keys[e.key.toLowerCase()] = true;
document.onkeyup = e => keys[e.key.toLowerCase()] = false;

// ===== UPDATE =====
function update() {

  if (keys["a"]) player.vx = -player.speed;
  else if (keys["d"]) player.vx = player.speed;
  else player.vx = 0;

  if (keys["w"]) player.vy += player.lift;

  player.vy += player.gravity;

  player.x += player.vx;
  player.y += player.vy;

  // FIX MAP
  if (player.x < 0) player.x = 0;
  if (player.x > mapWidth - player.w) player.x = mapWidth - player.w;

  // FIX GROUND
  if (player.y + player.h >= ground) {
    player.y = ground - player.h;
    player.vy = 0;
  }
}

// ===== DRAW =====
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // trời
  ctx.fillStyle = "#87CEEB";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // đất
  ctx.fillStyle = "#654321";
  ctx.fillRect(0,ground,canvas.width,100);

  // player
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.ellipse(player.x+20,player.y+30,18,28,0,0,Math.PI*2);
  ctx.fill();
}

// LOOP
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
